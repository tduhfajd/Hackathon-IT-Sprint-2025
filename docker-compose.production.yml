version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-support-backend
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_API}
      - VIRTUAL_PORT=3001
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_API}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - WEBSOCKET=true
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GIGACHAT_CLIENT_ID=${GIGACHAT_CLIENT_ID}
      - GIGACHAT_AUTH_KEY=${GIGACHAT_AUTH_KEY}
      - API_URL=${API_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    ports:
      - "3001:3001"
    volumes:
      - ./files:/app/files
      - ./backend/certs:/app/certs:ro
    networks:
      - nginx-net
      - backend-net
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Landing Page
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    container_name: smart-support-landing
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_LANDING}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_LANDING}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Frontend - User Interface
  frontend-user:
    build:
      context: ./frontend/user
      dockerfile: Dockerfile
    container_name: smart-support-frontend-user
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_USER}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_USER}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net
    depends_on:
      - backend

  # Frontend - Operator Dashboard
  frontend-operator:
    build:
      context: ./frontend/operator
      dockerfile: Dockerfile
    container_name: smart-support-frontend-operator
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_OPERATOR}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_OPERATOR}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net
    depends_on:
      - backend

  # Frontend - Admin Panel
  frontend-admin:
    build:
      context: ./frontend/admin
      dockerfile: Dockerfile
    container_name: smart-support-frontend-admin
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_ADMIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_ADMIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net
    depends_on:
      - backend

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: smart-support-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d smart_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smart-support-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: smart-support-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - VIRTUAL_HOST=${VIRTUAL_HOST_RABBITMQ}
      - VIRTUAL_PORT=15672
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_RABBITMQ}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend-net
      - nginx-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker (Python)
  celery-worker:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: smart-support-celery-worker
    restart: unless-stopped
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST}
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_PASS=${RABBITMQ_DEFAULT_PASS}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - GIGACHAT_CLIENT_ID=${GIGACHAT_CLIENT_ID}
      - GIGACHAT_AUTH_KEY=${GIGACHAT_AUTH_KEY}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
    networks:
      - backend-net
    depends_on:
      - rabbitmq
      - db
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  # User Frontend
  user-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - FRONTEND_DIR=user
        - VITE_API_URL=https://api-smartsupport.vadimevgrafov.ru
        - VITE_WS_URL=wss://api-smartsupport.vadimevgrafov.ru
    container_name: smart-support-user-frontend
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_USER}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_USER}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net

  # Operator Frontend
  operator-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - FRONTEND_DIR=operator
        - VITE_API_URL=https://api-smartsupport.vadimevgrafov.ru
        - VITE_WS_URL=wss://api-smartsupport.vadimevgrafov.ru
    container_name: smart-support-operator-frontend
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_OPERATOR}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_OPERATOR}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net

  # Admin Frontend
  admin-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - FRONTEND_DIR=admin
        - VITE_API_URL=https://api-smartsupport.vadimevgrafov.ru
        - VITE_WS_URL=wss://api-smartsupport.vadimevgrafov.ru
    container_name: smart-support-admin-frontend
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=${VIRTUAL_HOST_ADMIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${VIRTUAL_HOST_ADMIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - nginx-net

  # Documentation & Files Server
  docs:
    image: nginx:alpine
    container_name: smart-support-docs
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=docs-smartsupport.vadimevgrafov.ru
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=docs-smartsupport.vadimevgrafov.ru
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - ./static:/usr/share/nginx/html:ro
      # Use default nginx config inside image; custom config removed due to context errors
    networks:
      - nginx-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  nginx-net:
    external: true
  backend-net:
    driver: bridge
