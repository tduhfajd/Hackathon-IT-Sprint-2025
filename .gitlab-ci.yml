image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

stages:
  - deploy

before_script:
  - apt-get update -qq && apt-get install -y -qq git
  - pip install -q mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin

pages:
  stage: deploy
  tags:
    - docker
  script:
    - echo "📚 Building static site from Wiki..."
    
    # Используем локальные файлы wiki
    - |
      if [ -d "wiki" ] && [ "$(ls -A wiki/*.md 2>/dev/null)" ]; then
        echo "✅ Using local wiki files..."
        mkdir -p docs
        cp wiki/*.md docs/ 2>/dev/null || true
        if [ ! -f "docs/index.md" ] && [ -f "docs/home.md" ]; then
          cp docs/home.md docs/index.md
        fi
      else
        echo "❌ No wiki files found!"
        exit 1
      fi
      
    # Создаем простой mkdocs.yml
    - |
      cat > mkdocs.yml << 'ENDCONFIG'
      site_name: IT Support Wiki
      site_description: Документация проекта IT Support
      site_url: https://itsprint.pages.vadimevgrafov.ru
      repo_url: https://gitlab.vadimevgrafov.ru/it-sprint/it-support
      repo_name: IT Support
      theme:
        name: material
        palette:
          - scheme: default
            primary: blue
            accent: blue
            toggle:
              icon: material/brightness-7
              name: Switch to dark mode
          - scheme: slate
            primary: blue
            accent: blue
            toggle:
              icon: material/brightness-4
              name: Switch to light mode
        features:
          - navigation.tabs
          - navigation.sections
          - navigation.expand
          - navigation.indexes
          - navigation.top
          - search.suggest
          - search.highlight
          - content.code.annotate
          - content.code.copy
          - content.tabs.link
      plugins:
        - search
        - git-revision-date-localized:
            enable_creation_date: true
      markdown_extensions:
        - pymdownx.highlight:
            anchor_linenums: true
        - pymdownx.inlinehilite
        - pymdownx.snippets
        - pymdownx.superfences
        - pymdownx.tabbed:
            alternate_style: true
        - pymdownx.tasklist:
            custom_checkbox: true
        - toc:
            permalink: true
        - tables
        - attr_list
        - md_in_html
      ENDCONFIG
      
    # Генерируем навигацию из файлов
    - |
      python3 << 'ENDPYTHON'
      import os
      import re
      from pathlib import Path
      
      docs_dir = Path("docs")
      nav_items = []
      
      # Проверяем наличие index.md или home.md
      if (docs_dir / "index.md").exists():
          nav_items.append("  - Home: index.md")
      elif (docs_dir / "home.md").exists():
          nav_items.append("  - Home: home.md")
      elif (docs_dir / "README.md").exists():
          nav_items.append("  - Home: README.md")
      
      # Находим все .md файлы и сортируем
      md_files = sorted([f for f in docs_dir.glob("*.md") 
                         if f.name not in ["index.md", "home.md", "README.md"]])
      
      for md_file in md_files:
          try:
              with open(md_file, 'r', encoding='utf-8') as f:
                  first_line = f.readline().strip()
                  title = re.sub(r'^#+\s*', '', first_line)
                  if not title:
                      title = md_file.stem.replace('-', ' ').replace('_', ' ').title()
                  nav_items.append(f'  - {title}: {md_file.name}')
          except:
              pass
      
      # Добавляем nav секцию в mkdocs.yml
      with open("mkdocs.yml", 'a', encoding='utf-8') as f:
          f.write('\nnav:\n')
          for item in nav_items:
              f.write(item + '\n')
      
      print(f"✅ Generated navigation with {len(nav_items)} pages")
      ENDPYTHON
      
    # Строим сайт
    - echo "🏗️  Building static site..."
    - mkdocs build --site-dir public
    
    # Проверяем результат
    - |
      if [ -d "public" ] && [ "$(ls -A public)" ]; then
        echo "✅ Site built successfully!"
        ls -lah public/
      else
        echo "❌ Build failed!"
        exit 1
      fi
      
  artifacts:
    paths:
      - public
    expire_in: 1 hour
    
  # Запускается только при изменении файлов в wiki/ или при ручном запуске
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - wiki/**/*
        - .gitlab-ci.yml
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never
    
  environment:
    name: pages
    url: https://itsprint.pages.vadimevgrafov.ru
